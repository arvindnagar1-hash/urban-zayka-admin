<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#16213E"/>
<title>Urban ज़ायका — Admin</title>
<link rel="manifest" href="/manifest.json"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',system-ui,sans-serif;background:#16213E;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:#fff;border-radius:20px;padding:36px 32px;width:100%;max-width:380px;margin:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.logo{text-align:center;margin-bottom:28px;}
.logo h1{font-size:26px;font-weight:800;color:#16213E;}
.logo h1 span{color:#F40009;}
.logo p{color:#888;font-size:13px;margin-top:4px;}
.badge{background:#fff5f5;border:1.5px solid #ffd0d0;color:#F40009;font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;display:inline-block;margin-top:8px;}
label{display:block;font-size:12px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
input{width:100%;border:1.5px solid #e0e0e0;border-radius:10px;padding:12px 14px;font-size:15px;outline:none;transition:border-color .2s;font-family:inherit;}
input:focus{border-color:#F40009;}
.inp-wrap{position:relative;margin-bottom:20px;}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:#888;}
.login-btn{width:100%;background:#F40009;color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s;margin-top:4px;}
.login-btn:hover{opacity:.9;}
.login-btn:active{opacity:.8;transform:scale(.99);}
.err{background:#fff5f5;border:1.5px solid #ffd0d0;color:#c62828;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;}
.err.show{display:block;}
.footer{text-align:center;margin-top:20px;color:#bbb;font-size:12px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>Urban <span>ज़ायका</span></h1>
    <p>Restaurant Management Panel</p>
    <span class="badge">🔐 Admin Access Only</span>
  </div>

  <div class="err" id="errMsg">❌ Incorrect password. Please try again.</div>

  <label for="pwd">Password</label>
  <div class="inp-wrap">
    <input type="password" id="pwd" placeholder="Enter admin password" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()"/>
    <button class="eye-btn" onclick="toggleEye()" id="eyeBtn">👁️</button>
  </div>

  <button class="login-btn" onclick="login()">Login →</button>

  <div class="footer">Urban ज़ायका · Met City, Haryana</div>
</div>

<script>
// Check if already logged in
if(sessionStorage.getItem('uz_admin')==='1') location.href='/dashboard.html';

function login(){
  const pwd=document.getElementById('pwd').value;
  const err=document.getElementById('errMsg');
  if(pwd==='zayka@2024'){
    sessionStorage.setItem('uz_admin','1');
    location.href='/dashboard.html';
  } else {
    err.classList.add('show');
    document.getElementById('pwd').value='';
    document.getElementById('pwd').focus();
    setTimeout(()=>err.classList.remove('show'),3000);
  }
}
function toggleEye(){
  const inp=document.getElementById('pwd');
  const btn=document.getElementById('eyeBtn');
  if(inp.type==='password'){ inp.type='text'; btn.textContent='🙈'; }
  else{ inp.type='password'; btn.textContent='👁️'; }
}
if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
</script>
</body>
</html>
